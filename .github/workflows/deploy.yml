name: Deploy para GitHub Pages

on:
  push:
    branches:
      - main # O workflow dispara quando você faz push na main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Deploy para a branch gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # Pasta onde o Vite coloca o build
          publish_branch: gh-pages # Branch que serve o site
          force_orphan: true # Isso limpa o histórico da gh-pages a cada deploy